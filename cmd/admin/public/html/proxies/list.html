<h1 class="page-header">代理服务器</h1>

<div>
    <form style="margin-bottom: 3px;" class="form-inline">  
        <label for="LogLevel">日志级别:</label>
        <select ng-model="logLevel" id="LogLevel">
            <option value="info">info</option>
            <option value="debug">debug</option>
            <option value="warn">warn</option>
            <option value="error">error</option>
        </select>

        <label for="search">搜索:</label>
        <input type="text" class="form-control" ng-model="q" id="search" />
    </form>
</div>

<div class="table-responsive">
    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>代理服务地址</th>
            <th>管理地址</th>
            <th>日志级别</th>
            <th>操作</th>
        </tr>
        </thead>

        <tbody>
            <tr ng-repeat="proxy in proxies">
                <td>{{proxy.conf.addr}}</td>
                <td>{{proxy.conf.mgrAddr}}</td>
                <td>{{proxy.conf.logLevel}}</td>
                <td>
                    <button type="button" class="btn btn-success btn-sm" ng-click="setLogLevel(proxy.conf.mgrAddr)">设置日志级别</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

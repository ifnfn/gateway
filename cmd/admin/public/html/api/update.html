<div class="panel panel-default">
	<div class="panel-heading">更新 API URL</div>
	<div class="panel-body">
		<div class="form-group">
			<label for="name">API 名称</label>
			<span id="name">{{api.name}}</span>
		</div>

		<div class="form-group">
			<label for="url">URL</label>
			<input type="text" class="form-control" ng-model="api.url" id="url">
		</div>

		<div class="form-group">
			<label for="method">HTTP 方法</label>

			<select class="form-control" ng-model="api.method" id="method">
                <option value="*">*</option>
                <option value="GET">GET</option>
                <option value="PUT">PUT</option>
                <option value="POST">POST</option>
                <option value="DELETE">DELETE</option>
            </select>
		</div>

		<div class="form-group">
			<label for="status">状态</label>
			<select class="form-control" ng-model="api.status" id="status">
                <option value="0">下线</option>
                <option value="1">在线</option>
            </select>
		</div>

		<div class="form-group">
			<label for="desc">详细描述</label>
			<textarea class="form-control" ng-model="api.desc" id="desc" rows="4"></textarea>
		</div>

		<div class="form-group">
			<label for="accessControl">访问控制</label>
			<textarea json-text class="form-control" ng-model="api.accessControl" id="accessControl" rows="15"></textarea>
		</div>

		<div class="form-group">
			<label for="mock">Mock</label>
			<textarea json-text class="form-control" ng-model="api.mock" id="mock" rows="15"></textarea>
		</div>
	</div>
</div>

<div class="panel panel-default">
	<div class="panel-heading">更新 API 转发到集群结点</div>
	<div class="panel-body">
		<form class="form-inline">
			<div class="form-group">
				<label for="clusterName">集群</label>
				<select class="form-control" ng-model="newClusterName" id="clusterName">
                    <option ng-repeat="c in clusters" value="{{c.name}}">{{c.name}}</option>
                </select>
			</div>
			<div class="form-group">
				<label for="nodeAttrName">属性名</label>
				<input type="text" size="10" class="form-control" ng-model="newNodeAttrName" id="nodeAttrName" />
			</div>
			<div class="form-group">
				<label for="nodeRewrite">重定向</label>
				<input type="text" class="form-control" ng-model="newNodeRewrite" id="nodeRewrite" />
			</div>
			<div class="form-group">
				<label for="validation">校验</label>
				<textarea json-text class="form-control" ng-model="newValidation" id="validation" rows="15"></textarea>
			</div>
			<button type="button" class="btn btn-default" ng-click="addNode()">增加</button>
		</form>
	</div>
</div>

<table class="table table-bordered table-striped">
	<thead>
		<tr>
			<th>集群</th>
			<th>属性名</th>
			<th>重定向</th>
			<th>校验</th>
			<th>操作</th>
		</tr>
	</thead>

	<tbody>
		<tr ng-repeat="n in api.nodes">
			<td>{{n.clusterName}}</td>
			<td>
				<input type="text" ng-model="n.attrName" />
			</td>
			<td>
				<input type="text" ng-model="n.rewrite" />
			</td>
			<td>
				<textarea json-text class="form-control" ng-model="n.validations" rows="15"></textarea>
			</td>
			<td>
				<button type="button" class="btn btn-default" ng-click="delete(n)">删除</button>
			</td>
		</tr>
	</tbody>
</table>

<button type="button" class="btn btn-default" ng-click="update()">更新</button>

<div class="panel panel-default">
    <div class="panel-heading">集群详细信息</div>
    <div class="panel-body">
        <div class="form-group">
            <label>
                <strong>集群名称:</strong>
                {{cluster.name}}
            </label>
        </div>

        <div class="form-group">
            <label for="clusterLBName">集群负载均衡算法</label>
            <select class="form-control" ng-model="cluster.lbName" id="clusterLBName">
                <option ng-repeat="lb in lbs" ng-selected="cluster.lbName" value="{{lb}}">{{lb}}</option>
            </select>
        </div>

        <button type="button" class="btn btn-default" ng-click="update()">更新</button>
    </div>
</div>

<div class="panel panel-default">
    <div class="panel-heading">绑定的服务器</div>
    <div class="panel-body">
        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>服务器名</th>
                    </tr>
                </thead>

                <tbody>
                    <tr ng-repeat="server in cluster.bindServers">
                        <td>
                            <a href="#/servers/{{server}}">{{server}}</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="panel panel-default">
    <div class="panel-heading">创建新的服务器集群</div>
    <div class="panel-body">
        <div class="form-group">
            <label for="clusterName">集群名称</label>
            <input type="text" class="form-control" ng-model="newClusterName" id="clusterName" placeholder="集群名称">
        </div>
        <div class="form-group">
            <label for="clusterLBName">选择负载均衡算法</label>
            <select class="form-control" ng-model="newClusterLBName" id="clusterLBName">
                <option ng-repeat="lb in lbs" value="{{lb}}">{{lb}}</option>
            </select>
        </div>
        <button type="button" class="btn btn-default" ng-click="add()">增加</button>
    </div>
</div>
